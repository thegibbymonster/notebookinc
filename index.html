<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>notebook comix inc.</title>
  <style>
    body {
      font-family: 'comic sans ms', cursive, sans-serif;
      background: #0f0f23;
      color: #ffeb3b;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 {
      font-size: 3rem;
      text-shadow: 4px 4px #ff4444;
      margin-bottom: 40px;
    }
    .comic-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .comic-card {
      background: #222;
      border: 5px solid #ffeb3b;
      border-radius: 15px;
      padding: 15px;
      width: 320px;
      box-shadow: 0 0 20px rgba(255,235,59,0.5);
      transition: transform 0.2s;
    }
    .comic-card:hover {
      transform: scale(1.08);
    }
    .comic-card img {
      width: 100%;
      border-radius: 10px;
      border: 3px solid white;
    }
    .comic-title {
      font-size: 1.5rem;
      margin: 15px 0 10px;
      color: #ffeb3b;
    }
    .read-btn {
      display: inline-block;
      background: #ff4444;
      color: white;
      padding: 12px 24px;
      text-decoration: none;
      border-radius: 30px;
      font-size: 1.2rem;
      margin-top: 10px;
    }
    .read-btn:hover {
      background: #ff6666;
    }
  </style>
</head>
<body>

  <h1>notebook comix drop zone</h1>

  <div class="comic-grid">

    <div class="comic-card">
      <img src="duffycomicno1.png" alt="doctor duffy #1">
      <div class="comic-title">doctor duffy comic mashup #1</div>
      <a href="https://gibbyplacethelinkhere.com" class="read-btn">read it now</a>
    </div>

    <!-- add more cards later when u stop being lazy -->
    <!-- <div class="comic-card"> ... </div> -->

  </div>

</body>
</html>
