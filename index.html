<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>notebook inc.</title>
  <link rel="icon" href="notebook comix inc..png" type="image/png">
  <style>
    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: #0f0f23;
      color: #ffeb3b;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    img.logo {
      width: 100%;
      max-width: 800px;
      height: auto;
      margin-bottom: 30px;
    }
    h1 {
      font-size: 3.5rem;
      text-shadow: 6px 6px #ff4444;
      margin: 0 0 40px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .comic-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .comic-card {
      background: #222;
      border: 5px solid #ffeb3b;
      border-radius: 15px;
      padding: 15px;
      width: 320px;
      box-shadow: 0 0 20px rgba(255,235,59,0.5);
      transition: transform 0.25s ease;
    }
    .comic-card:hover {
      transform: scale(1.08);
    }
    .comic-card img {
      width: 100%;
      border-radius: 10px;
      border: 3px solid #fff;
      background: #000;
    }
    .comic-title {
      font-size: 1.5rem;
      margin: 15px 0 10px;
      color: #ffeb3b;
      line-height: 1.3;
    }
    .read-btn {
      display: inline-block;
      background: #ff4444;
      color: white;
      padding: 12px 24px;
      text-decoration: none;
      border-radius: 30px;
      font-size: 1.2rem;
      margin-top: 10px;
      font-weight: bold;
    }
    .read-btn:hover {
      background: #ff6666;
    }
  </style>
</head>
<body>
  <h1>notebook inc.</h1>

  <div class="comic-grid">
    <div class="comic-card">
      <img src="ascension.png" alt="the ascension comic cover">
      <div class="comic-title">the ascension<br><small>(written by the CEO )</small></div>
      <a href="https://www.amazon.com/Ascension-gibson-gibby-major/dp/B0FWTWXK8V" 
         class="read-btn" target="_blank" rel="noopener noreferrer">buy it now</a>
    </div>

    <div class="comic-card">
      <img src="coming soon.png" alt="coming soon placeholder">
      <div class="comic-title">coming soon!</div>
      <a href="#" class="read-btn">coming soon!</a>
    </div>
  </div>
</body>
</html>
